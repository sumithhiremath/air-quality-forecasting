name: Hourly AQI Data Collection

on:
  schedule:
    - cron: "0 * * * *"  # runs every hour
  workflow_dispatch:       # lets you trigger manually too

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests pandas python-dotenv

      - name: Run ingestion
        env:
          WAQI_TOKEN: ${{ secrets.WAQI_TOKEN }}
        run: python src/ingestion.py

      - name: Commit new data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/raw/
          git diff --staged --quiet || git commit -m "Auto: AQI data collected $(date -u '+%Y-%m-%d %H:%M')"
          git push