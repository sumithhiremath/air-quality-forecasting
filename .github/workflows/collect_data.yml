name: Hourly AQI Data Collection

on:
  schedule:
    - cron: "0 * * * *"   # Every hour at :00 minutes (UTC)
  workflow_dispatch:        # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests pandas python-dotenv

      - name: Verify WAQI_TOKEN is set
        run: |
          if [ -z "$WAQI_TOKEN" ]; then
            echo "ERROR: WAQI_TOKEN secret is not set in GitHub repo settings!"
            echo "Go to: Settings > Secrets and variables > Actions > New repository secret"
            exit 1
          else
            echo "WAQI_TOKEN is set (length: ${#WAQI_TOKEN})"
          fi
        env:
          WAQI_TOKEN: ${{ secrets.WAQI_TOKEN }}

      - name: Run ingestion
        env:
          WAQI_TOKEN: ${{ secrets.WAQI_TOKEN }}
        run: |
          cd $GITHUB_WORKSPACE
          python src/ingestion.py

      - name: Show collected files
        run: |
          echo "Files in data/raw/:"
          ls -lh data/raw/ | tail -20

      - name: Commit new data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/raw/
          git diff --staged --quiet || git commit -m "Auto: AQI data collection $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push